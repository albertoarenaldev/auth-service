# =====================================================================
# CI ‚Äî Auth Service
# =====================================================================
# - En `main` corre `mvn -B verify` (compile + test + package + JaCoCo)
#   porque `verify` es la fase que activa jacoco-maven-plugin y genera
#   el informe HTML de cobertura bajo target/site/jacoco/.
# - En feature branches (incluida `history-rewite`) corre `mvn -B clean
#   test` para dar feedback rapido en cada PR sin pagar el coste de
#   empaquetar ni generar el informe de cobertura.
#
# Optimizaciones:
#   - `cache: maven` en setup-java evita re-descargar dependencias en cada run
#   - `concurrency` cancela runs redundantes en pushes sucesivos de la misma rama
#   - `timeout-minutes: 15` protege contra jobs colgados
#   - `permissions: contents: read` aplica least-privilege
# =====================================================================

name: CI

on:
  push:
    branches: [main, history-rewite]
  pull_request:
    branches: [main, history-rewite]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build and test (feature branches)
        if: github.ref != 'refs/heads/main'
        run: mvn -B clean test

      - name: Verify and JaCoCo (main)
        if: github.ref == 'refs/heads/main'
        run: mvn -B verify
