# =====================================================================
# Perfil DEV — H2 en memoria + MailHog (Docker Compose)
# =====================================================================

# H2 in-memory
spring.datasource.url=jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# H2 console (solo dev)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Mail — apunta a MailHog (correo en :1025, web UI en :8025)
spring.mail.host=${SPRING_MAIL_HOST:localhost}
spring.mail.port=${SPRING_MAIL_PORT:1025}
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.starttls.required=false

# Logging — DEBUG en nuestro paquete, INFO en el resto
logging.level.dev.albertoarenaldev.authservice=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Flyway: owns the schema, Hibernate just validates it matches the entities
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=2
spring.flyway.baseline-description=post-2c47105 (Hibernate auto-update)
spring.flyway.locations=classpath:db/migration
