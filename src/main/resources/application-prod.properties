# =====================================================================
# Perfil PROD — PostgreSQL + SMTP real
# =====================================================================

# PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/authdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:authuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Mail — SMTP real (override con variables de entorno)
spring.mail.host=${SPRING_MAIL_HOST:smtp.example.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Logging — INFO en producción
logging.level.dev.albertoarenaldev.authservice=INFO
logging.level.org.springframework.security=WARN

# Consola H2 deshabilitada en prod
spring.h2.console.enabled=false

# Flyway: owns the schema, Hibernate just validates it matches the entities
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=2
spring.flyway.baseline-description=post-2c47105 (Hibernate auto-update)
spring.flyway.locations=classpath:db/migration
