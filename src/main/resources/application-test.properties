# =====================================================================
# Perfil TEST — H2 única por contexto + sin overhead
# =====================================================================
# Pensado para tests de integración y JPA. NO usar para correr la app
# en local (eso es el perfil `dev`).
#
# Diferencias clave con `dev`:
#   - H2 con nombre ALEATORIO (${random.uuid}) para que cada test class /
#     contexto de Spring tenga su propia DB. Evita el bug de H2 compartida
#     entre contextos que tuvimos con `mem:authdb` + DB_CLOSE_DELAY=-1.
#   - `spring.jpa.defer-datasource-initialization=false` + `spring.sql.init.mode=never`:
#     deshabilitan cualquier import.sql o data.sql por seguridad.
#   - Logging mínimo (solo errores / warnings).
#   - H2 console deshabilitada (no aporta en tests).
#
# IMPORTANTE sobre el seeder:
#   - `DataSeeder` (CommandLineRunner) SOLO corre cuando el contexto
#     Spring arranca la app completa, es decir, en `@SpringBootTest`
#     (smoke test + DataSeederTest). NO corre en `@DataJpaTest`, que
#     solo carga beans de JPA. Por eso los tests de repositorio crean
#     su propio `Role("ROLE_TEST")` en `@BeforeEach`.
# =====================================================================

# H2 con UUID aleatorio → DB única por contexto de Spring
# (driverClassName, username, password son defaults de H2, se omiten)
spring.datasource.url=jdbc:h2:mem:testdb-${random.uuid};DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.defer-datasource-initialization=false

# Doble seguro contra SQL init (no hay import.sql pero por si en el futuro)
spring.sql.init.mode=never

# H2 console deshabilitada en tests
spring.h2.console.enabled=false

# Mail — el JavaMailSender se crea pero no se conecta a nada real.
# En tests del flujo de password-reset mockearemos con GreenMail o @MockBean.
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.starttls.required=false

# Logging — solo INFO/WARN para no ensuciar la salida de tests
logging.level.dev.albertoarenaldev.authservice=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN

# Mail health indicator desactivado: no hay SMTP server en el entorno de
# tests, así que el JavaMailSender reportaría DOWN y /actuator/health
# devolvería 503. No aporta valor en tests y ensucia el resultado.
management.health.mail.enabled=false

# JWT — solo los overrides que difieren de application.properties.
# Las expiraciones y demás defaults heredan de la config base.
app.jwt.secret=test-only-secret-do-not-use-in-production-32bytes-min-ok
app.jwt.issuer=auth-service-test

# Rate limiting deshabilitado en tests (peticiones comparten IP,
# el bucket se agotaria entre tests de integracion)
app.rate-limit.enabled=false

# NOTA sobre OAuth2 en tests:
# application.properties NO declara registros OAuth2 con defaults vacios.
# Eso significa que OAuth2ClientAutoConfiguration hace back-off natural
# (no se cargan registros, no se crea ClientRegistrationRepository).
# El @ConditionalOnBean en OAuth2AuthenticationSuccessHandler evita que
# el handler se cree. Resultado: cero config OAuth2 en tests, sin necesidad
# de excluir autoconfig manualmente.

# Flyway: owns the schema, Hibernate just validates it matches the entities
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=2
spring.flyway.locations=classpath:db/migration
