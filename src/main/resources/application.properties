# =====================================================================
# Auth Service — Configuración base (común a todos los perfiles)
# =====================================================================

spring.application.name=auth-service
server.port=8080

# Errores: incluir mensaje y binding errors en la respuesta
server.error.include-message=always
server.error.include-binding-errors=always

# Perfil activo (override con variable de entorno SPRING_PROFILES_ACTIVE)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ---------------------------------------------------------------------
# JWT — access token (corto) + refresh token (largo)
# ---------------------------------------------------------------------
# IMPORTANTE: en producción, JWT_SECRET debe ser un string de >= 32 bytes
# aleatorios. Genera uno con: openssl rand -base64 48
app.jwt.secret=${JWT_SECRET:dev-only-secret-please-change-in-production-min-256-bits-required}
app.jwt.issuer=auth-service
# 15 minutos
app.jwt.access-token-expiration-ms=900000
# 7 días
app.jwt.refresh-token-expiration-ms=604800000
# 1 hora
app.jwt.password-reset-token-expiration-ms=3600000

# ---------------------------------------------------------------------
# CORS — orígenes permitidos (CSV). En dev, defaults de Angular y Vite.
# En prod, override con APP_CORS_ORIGINS.
# ---------------------------------------------------------------------
app.cors.origins=${APP_CORS_ORIGINS:http://localhost:4200,http://localhost:5173}

# ---------------------------------------------------------------------
# Actuator — solo health e info
# ---------------------------------------------------------------------
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized
management.info.env.enabled=true
info.app.name=${spring.application.name}
info.app.description=Auth Service — portfolio project
