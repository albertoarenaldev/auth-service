# =====================================================================
# Auth Service — Configuración base (común a todos los perfiles)
# =====================================================================

spring.application.name=auth-service
server.port=8080

# Errores: incluir mensaje y binding errors en la respuesta
server.error.include-message=always
server.error.include-binding-errors=always

# Perfil activo (override con variable de entorno SPRING_PROFILES_ACTIVE)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ---------------------------------------------------------------------
# JWT — access token (corto) + refresh token (largo)
# ---------------------------------------------------------------------
# IMPORTANTE: en producción, JWT_SECRET debe ser un string de >= 32 bytes
# aleatorios. Genera uno con: openssl rand -base64 48
app.jwt.secret=${JWT_SECRET:dev-only-secret-please-change-in-production-min-256-bits-required}
app.jwt.issuer=auth-service
# 15 minutos
app.jwt.access-token-expiration-ms=900000
# 7 días
app.jwt.refresh-token-expiration-ms=604800000
# 15 minutos (alineado con OWASP Authentication Cheat Sheet — sweet spot
# entre seguridad y UX; los usuarios necesitan tiempo para abrir el correo
# y volver al formulario, pero un token de 24h+ ampla la ventana de ataque
# si el correo es interceptado)
app.jwt.password-reset-token-expiration-ms=900000
# 24 horas (el usuario acaba de registrarse; necesita tiempo para ver el correo
# y volver a la app. Mas largo que el de password reset para no frustrar registros.)
app.jwt.email-verification-token-expiration-ms=86400000

# Rate limiting — deshabilitar con false en test profile o via env var
app.rate-limit.enabled=${APP_RATE_LIMIT_ENABLED:true}

# ---------------------------------------------------------------------
# OAuth2 / OIDC — login con Google y GitHub
# ---------------------------------------------------------------------
# IMPORTANTE: las client-registrations NO se declaran aquí. Se inyectan
# desde variables de entorno estándar de Spring Boot via relaxed binding:
#   SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GITHUB_CLIENT_ID
#   SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GITHUB_CLIENT_SECRET
#   SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GITHUB_SCOPE
#   SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID
#   SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET
#   SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_SCOPE
#
# Si NINGUNA está presente, OAuth2ClientAutoConfiguration hace back-off
# automáticamente (no intenta configurar nada, no falla). El bean
# `ClientRegistrationRepository` simplemente no existe y el security
# filter chain se queda solo con JWT nativo.
#
# Mantenemos solo la URL interna de redireccion tras login exitoso:
app.oauth2.redirect-uri=${APP_OAUTH2_REDIRECT_URI:http://localhost:5173/oauth2/callback}

# ---------------------------------------------------------------------
# Password reset — URL base del frontend donde el usuario canjea el token
# que recibe por correo. El mail contiene un enlace del estilo:
#   {base-url}?token=<opaque-token>
# El frontend lee el query param, llama a POST /api/v1/auth/reset-password,
# devuelve 204, y el user vuelve a /login.
#
# Override en produccion con APP_PASSWORD_RESET_BASE_URL a la URL del
# frontend real (ej. https://app.example.com/reset-password).
# ---------------------------------------------------------------------
app.password-reset.base-url=${APP_PASSWORD_RESET_BASE_URL:http://localhost:5173/reset-password}

# ---------------------------------------------------------------------
# CORS — orígenes permitidos (CSV). En dev, defaults de Angular y Vite.
# En prod, override con APP_CORS_ORIGINS.
# ---------------------------------------------------------------------
app.cors.origins=${APP_CORS_ORIGINS:http://localhost:4200,http://localhost:5173}

# ---------------------------------------------------------------------
# Password policy — umbral minimo de score zxcvbn para aceptar una
# contrasena en /register y /reset-password. Score 0-4 (0=trivial,
# 4=inquebrantable). Default 3 (NIST SP 800-63B). Operativo puede
# endurecer sin redeploy via APP_SECURITY_PASSWORD_POLICY_MIN_ZXCVBN_SCORE.
# Ver PasswordPolicyProperties y StrongPasswordValidator para detalle.
# ---------------------------------------------------------------------
app.security.password-policy.min-zxcvbn-score=${APP_SECURITY_PASSWORD_POLICY_MIN_ZXCVBN_SCORE:3}

# ---------------------------------------------------------------------
# Actuator — health, info y prometheus metrics
# ---------------------------------------------------------------------
management.endpoints.web.exposure.include=health,info,prometheus
management.metrics.export.prometheus.enabled=true
management.endpoint.health.show-details=when_authorized
management.info.env.enabled=true
info.app.name=${spring.application.name}
info.app.description=Auth Service — JWT authentication microservice
